<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .h1{
            font-size: 4rem;
        }
.box{
    border:1px solid black;
    height: 200px;
    width: 200px;
    background-color: lightblue;
}
.container{
    display:grid;
    justify-items: center;
    grid-template-columns: 1fr;
    gap:1rem;

}

    </style>
</head>
<body>
    <h1>Responsive Web Design</h1>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
