<body>
    <div class="container">
        <img src="prabina.jpeg" alt="Profile Picture" class="profile_img">

        <h1 class="name">Prabina Kathayat</h1>
        <p class="bio">  I am a BIT student passionate about web development and design. I enjoy creating simple, attractive, and user-friendly websites while continuously improving my technical skills.</p>

        <div class="social">
            <h3>Connect with me</h3>
         
            <a href="https://www.linkedin.com/in/prabina-kathayat-9b1a4b1b3/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>

        <div class="form">
            <h2>Contact Me</h2>
           <form action="">
             <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br>
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" placeholder="Enter the subject" required>
            <br>
            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Enter your message" required></textarea>
            <br>
            <button type="submit">Send Message</button>   
           </form>  

        </div>



    </div>
