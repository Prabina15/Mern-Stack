<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height:300px;
            width:200px;
            background: rgb(206, 225, 166);
            /* transform: translate(position), rotate(orientation), scale(size),skew*/
            transform: translate(400px, 50px) rotate(50deg);
            transition: all 0.5s ease;
            
            
        }
        .box1{
            height:300px;
            width:200px;
            background: rgb(64, 142, 184);
            /* transform: translate(position), rotate(orientation), scale(size),skew*/
            transform: skew(-45deg);
        }
        .box:hover{
            transform: translate(400px, 50px) rotate(50deg)scale(1.5);
        }

    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box1"></div>
</body>
</html>
